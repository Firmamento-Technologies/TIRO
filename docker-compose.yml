services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - tiro-network

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - tiro-network

  tiro-core:
    build:
      context: ./tiro-core
      dockerfile: Dockerfile
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./tiro-core:/app
    networks:
      - tiro-network

  celery-worker:
    build:
      context: ./tiro-core
      dockerfile: Dockerfile
    command: celery -A tiro_core.celery_app worker --loglevel=info --concurrency=2
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./tiro-core:/app
    networks:
      - tiro-network

  celery-beat:
    build:
      context: ./tiro-core
      dockerfile: Dockerfile
    command: celery -A tiro_core.celery_app beat --loglevel=info
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./tiro-core:/app
    networks:
      - tiro-network

  tiro-ui:
    build:
      context: ./tiro-ui
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - TIRO_API_URL=http://tiro-core:8000
    depends_on:
      - tiro-core
    networks:
      - tiro-network

  # Bridge WhatsApp — richiede SYS_ADMIN per bubblewrap sandbox
  nanobot:
    build:
      context: ./nanobot
      dockerfile: Dockerfile
    volumes:
      - nanobot_data:/home/nanobot/.nanobot
    environment:
      - NANOBOT_REDIS__ENABLED=true
      - NANOBOT_REDIS__URL=redis://redis:6379/0
      - NANOBOT_REDIS_INBOUND_CHANNEL=nanobot:messaggi
      - NANOBOT_REDIS_OUTBOUND_CHANNEL=tiro:comandi:whatsapp
      - GROQ_API_KEY=${GROQ_API_KEY}
    ports:
      - "18790:18790"
    depends_on:
      redis:
        condition: service_healthy
    cap_add:
      - SYS_ADMIN
    security_opt:
      - apparmor=unconfined
      - seccomp=unconfined
    networks:
      - tiro-network

  # Trascrizione vocale locale — fallback per audio non-WhatsApp
  whisper:
    build:
      context: ./whisper
      dockerfile: Dockerfile
    environment:
      - WHISPER_MODEL=${WHISPER_MODEL:-base}
    ports:
      - "9000:9000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/salute"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - tiro-network

volumes:
  postgres_data:
  nanobot_data:     # Sessione WhatsApp + config persistente

networks:
  tiro-network:
    driver: bridge
